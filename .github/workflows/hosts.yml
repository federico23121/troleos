name: Run Node.js Script with Multiple Jobs

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      max_parallel:
        description: 'Maximum parallel jobs'
        required: false
        default: '11'
        type: string

jobs:
  run-script:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 11
     matrix:
  job_id: [
    "thr1.AAAAAGhyuFGK1FpLaTZErw.zaBAF7RdE7A",
    "thr1.AAAAAGhyuJYqiLFVMWshYQ.M5s_GPTtwy0",
    "thr1.AAAAAGhyuMLfbBgTpGpsaA.1MVD9WlBbTg",
    "thr1.AAAAAGhyuOIMweyLgX5ZPw.A2SO0igjTYI",
    "thr1.AAAAAGhyuRTlKDr2CKjVIg.UUv_RjxqLzA",
    "thr1.AAAAAGhyuScNloCMuxW4OQ.SRQNoatgNSo",
    "thr1.AAAAAGhyuUih-r4wbt5Utw.RUtkRTiICio",
    "thr1.AAAAAGhyuVw7wDDztrxtzw.dWZriG7ASxQ"
  ]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Limpiar entorno previo
        run: rm -rf node_modules package-lock.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias (incluye haxball.js)
        run: |
          npm install haxball.js
          npm install  # Esto instalará también tus otras dependencias del package.json si existen

      - name: Esperar inicio sincronizado
        run: sleep $((RANDOM % 10 + 5))

      - name: Ejecutar script
        run: node hostbots.js
        env:
          JOB_ID: ${{ matrix.job_id }}
        timeout-minutes: 60
